<!DOCTYPE html>
<html lang="th" class="bg-zinc-950">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Todo List</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* ขีดทับข้อความเมื่อ task เสร็จแล้ว */
      .todo-text.done {
        text-decoration: line-through;
        opacity: 0.4;
      }
    </style>
  </head>

  <body class="min-h-screen bg-zinc-950 text-zinc-100 flex items-start justify-center px-4 py-16">

    <div class="w-full max-w-lg">

      <!-- ---- Header ---- -->
      <div class="mb-8 text-center">
        <h1 class="text-4xl font-bold tracking-tight text-white">My Todo List</h1>
        <!-- นับจำนวน task ที่ยังไม่เสร็จ — อัพเดตโดย app.js -->
        <p class="mt-2 text-sm text-zinc-500">
          <span id="pending-count">0</span> task ที่ยังไม่เสร็จ
        </p>
      </div>

      <!-- ---- Input row ---- -->
      <div class="flex gap-2 mb-6">
        <input
          id="todo-input"
          type="text"
          placeholder="เพิ่ม task ใหม่..."
          autocomplete="off"
          class="flex-1 rounded-lg bg-zinc-800 border border-zinc-700 px-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-500 outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500 transition"
        />
        <button
          id="add-btn"
          class="rounded-lg bg-violet-600 hover:bg-violet-500 active:bg-violet-700 px-5 py-2.5 text-sm font-semibold text-white transition"
        >
          + เพิ่ม
        </button>
      </div>

      <!-- ---- Todo list ---- -->
      <!-- app.js จะ render <li> เข้ามาใน ul นี้ -->
      <ul id="todo-list" class="space-y-2"></ul>

    </div>

    <!-- โหลด JavaScript ที่ท้าย body -->
    <script src="app.js"></script>
  </body>
</html>
